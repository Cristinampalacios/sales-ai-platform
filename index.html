// ÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂ Claude API Call ÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂ
async function callClaudeAPI(apiKey, fileContents, dealNotes, onStatus, dealProducts, dealUpdates) {
  const content = [];
  var totalBase64 = 0;
  var MAX_BASE64 = 8 * 1024 * 1024; // ~8MB base64 total (safe for Sonnet's context)

  // Sort files: smaller first so we fit more
  var sorted = fileContents.slice().sort(function (a, b) {
    var sa = a.base64 ? a.base64.length : a.text ? a.text.length : 0;
    var sb = b.base64 ? b.base64.length : b.text ? b.text.length : 0;
    return sa - sb;
  });

  // Add each file as a document or text block
  for (const file of sorted) {
    if (file.type === "application/pdf") {
      var pdfSize = file.base64 ? file.base64.length : 0;
      // Skip single PDFs over 20MB
      if (pdfSize > 20 * 1024 * 1024) {
        if (onStatus) onStatus("Skipping " + file.name + " (too large, >15MB)");
        continue;
      }
      // If adding this PDF would exceed our budget, skip it
      if (totalBase64 + pdfSize > MAX_BASE64) {
        if (onStatus) onStatus("Skipping " + file.name + " (combined files too large for API)");
        continue;
      }
      totalBase64 += pdfSize;
      if (onStatus) onStatus("Adding PDF: " + file.name + (file.pageCount ? " (" + file.pageCount + " pages)" : ""));
      content.push({
        type: "document",
        source: {
          type: "base64",
          media_type: "application/pdf",
          data: file.base64
        }
      });
    } else {
      var label = file.originalType === "pdf" ? "Adding PDF (text, " + (file.pageCount || "?") + " pg): " : "Adding: ";
      if (onStatus) onStatus(label + file.name);
      content.push({
        type: "text",
        text: "--- FILE: " + file.name + " ---\n" + file.text
      });
    }
  }
  if (content.length === 0) {
    throw new Error("No valid files to analyze. Files may be too large or unreadable.");
  }

  // Add deal notes if any (legacy)
  if (dealNotes && dealNotes.trim()) {
    content.push({
      type: "text",
      text: "--- DEAL NOTES ---\n" + dealNotes
    });
  }

  // Add deal updates (timestamped activity log from AE)
  if (dealUpdates && dealUpdates.length > 0) {
    var updatesText = dealUpdates.map(function (u) {
      return "[" + u.timestamp + "] " + u.text;
    }).join("\n\n");
    content.push({
      type: "text",
      text: "--- AE DEAL UPDATES (most recent first) ---\nThese are real-time updates logged by the account executive. Treat these as primary intelligence ÃÂÃÂ¢ÃÂÃÂÃÂÃÂ they contain call notes, email summaries, champion feedback, competitive intel, and next steps.\n\n" + updatesText
    });
    if (onStatus) onStatus("Including " + dealUpdates.length + " deal update(s) as context...");
  }

  // Add product context for sales motion
  if (dealProducts && dealProducts.length > 0) {
    content.push({
      type: "text",
      text: "--- PRODUCT CONTEXT ---\nThis deal involves the following NiCE + Cognigy products: " + dealProducts.join(", ") + ". Tailor your extraction to focus on data points relevant to selling these specific products. For example, if Cognigy AI is selected, focus on self-service metrics, containment rates, bot use cases, and AI readiness. If CXone is selected, focus on agent seats, omnichannel requirements, migration from legacy platforms. If WFM is selected, focus on scheduling, forecasting, adherence, and workforce optimization."
    });
  }

  // Add extraction prompt
  content.push({
    type: "text",
    text: MEDDPICC_PROMPT
  });
  if (onStatus) onStatus("Sending " + content.length + " blocks (" + Math.round(totalBase64 / 1024) + " KB) to Claude...");

  // Abort after 3 minutes
  var controller = new AbortController();
  var timeout = setTimeout(function () {
    controller.abort();
  }, 180000);
  try {
    var resp = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      signal: controller.signal,
      headers: {
        "Content-Type": "application/json",
        "x-api-key": apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 8192,
        messages: [{
          role: "user",
          content: content
        }]
      })
    });
  } catch (fetchErr) {
    clearTimeout(timeout);
    if (fetchErr.name === "AbortError") {
      throw new Error("Request timed out after 3 minutes. Try uploading fewer or smaller files.");
    }
    throw new Error("Network error: " + fetchErr.message);
  }
  clearTimeout(timeout);
  if (onStatus) onStatus("Receiving response from Claude...");
  if (!resp.ok) {
    var errBody = "";
    try {
      errBody = await resp.text();
    } catch (e) {}
    if (resp.status === 413) throw new Error("Files too large for API. Try uploading fewer or smaller files.");
    if (resp.status === 429) throw new Error("Rate limited. Wait a minute and try again.");
    if (resp.status === 401) throw new Error("Invalid API key. Check Settings.");
    // Token limit errors
    if (resp.status === 400 && errBody.indexOf("token") >= 0) {
      throw new Error("Too much content for the API. Try removing some files \u2014 the combined input exceeds the model's token limit.");
    }
    // 100-page PDF limit
    if (resp.status === 400 && errBody.indexOf("100 PDF pages") >= 0) {
      throw new Error("A PDF exceeds the 100-page API limit. Split the large PDF into smaller files or use a shorter document.");
    }
    throw new Error("API error " + resp.status + ": " + errBody.substring(0, 300));
  }
  var data = await resp.json();
  if (!data.content || !data.content[0] || !data.content[0].text) {
    throw new Error("Empty response from Claude. The model may have been unable to process the files.");
  }
  var text = data.content[0].text;

  // Parse JSON from response (handle markdown code blocks)
  var jsonStr = text;
  var jsonMatch = text.match(/```(?:json)?\s*([\s\S]*?)```/);
  if (jsonMatch) jsonStr = jsonMatch[1];
  jsonStr = jsonStr.trim();
  try {
    return JSON.parse(jsonStr);
  } catch (parseErr) {
    console.error("Failed to parse Claude response:", text.substring(0, 500));
    throw new Error("Claude returned invalid JSON. This usually means the response was truncated. Try with fewer files.");
  }
}

// ÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂ Read file content ÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂ
function readFileContent(file) {
  return new Promise(function (resolve, reject) {
    var isPDF = file.type === "application/pdf" || file.name.toLowerCase().endsWith(".pdf");
    if (isPDF) {
      var reader = new FileReader();
      reader.onload = function (ev) {
        try {
          var base64 = ev.target.result.split(",")[1];
          resolve({
            name: file.name,
            type: "application/pdf",
            base64: base64
          });
        } catch (err) {
          reject(err);
        }
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    } else {
      var reader = new FileReader();
      reader.onload = function (e) {
        resolve({
          name: file.name,
          type: "text/plain",
          text: e.target.result
        });
      };
      reader.onerror = reject;
      reader.readAsText(file);
    }
  });
}

const LS_KEY = "salesai_deals_v2";
const API_KEY_KEY = "salesai_api_key";
function loadAllDeals() {
  try {
    var data = JSON.parse(localStorage.getItem(LS_KEY));
    if (data && Object.keys(data).length > 0) return data;
    // Fallback: try backup key if primary is empty
    var backup = JSON.parse(localStorage.getItem("salesai_deals_backup"));
    if (backup && Object.keys(backup).length > 0) {
      console.warn("[SalesAI] Primary storage empty, restored from backup");
      localStorage.setItem(LS_KEY, JSON.stringify(backup));
      return backup;
    }
    return {};
  } catch (e) {
    // If primary is corrupt, try backup
    try {
      var backup2 = JSON.parse(localStorage.getItem("salesai_deals_backup"));
      if (backup2 && Object.keys(backup2).length > 0) {
        console.warn("[SalesAI] Primary storage corrupt, restored from backup");
        localStorage.setItem(LS_KEY, JSON.stringify(backup2));
        return backup2;
      }
    } catch(e2) {}
    return {};
  }
}
function saveAllDeals(all) {
  localStorage.setItem(LS_KEY, JSON.stringify(all));
}
function loadApiKey() {
  try {
    return localStorage.getItem(API_KEY_KEY) || "";
  } catch (e) {
    return "";
  }
}
function saveApiKey(k) {
  localStorage.setItem(API_KEY_KEY, k);
}

// Migration & Account Model
function migrateToAccountModel(flatDeals) {
  if (!flatDeals || Object.keys(flatDeals).length === 0) return {};
  const firstVal = Object.values(flatDeals)[0];
  if (firstVal && firstVal.type === 'account') return flatDeals;
  const result = {};
  for (const [key, dealData] of Object.entries(flatDeals)) {
    result[key] = {
      type: 'account',
      name: dealData.name || key,
      opportunities: {
        [key + '_primary']: {
          ...dealData,
          type: 'opportunity'
        }
      }
    };
  }
  return result;
}

// Sanitize deals: merge any accounts whose keys contain '/' (corrupt nested keys)
// back into the correct base account, preventing runaway duplication.
function sanitizeDeals(deals) {
  if (!deals || typeof deals !== 'object') return deals;
  var clean = {};
  var mergeCount = 0;
  for (var acctKey of Object.keys(deals)) {
    var acct = deals[acctKey];
    // If account key contains '/', it's a corrupt nested key
    var baseAcctKey = acctKey.indexOf('/') >= 0 ? acctKey.split('/')[0] : acctKey;
    if (!clean[baseAcctKey]) {
      if (baseAcctKey === acctKey) {
        // Normal account — clone it
        clean[baseAcctKey] = JSON.parse(JSON.stringify(acct));
      } else {
        // Corrupt key and no base account yet — create wrapper
        clean[baseAcctKey] = { type: 'account', name: acct.name || baseAcctKey, opportunities: {} };
      }
    }
    // Merge opportunities (skip ghost opps where key matches acctKey)
    var opps = (acct.opportunities || {});
    for (var oppK of Object.keys(opps)) {
      var baseOppKey = oppK.indexOf('/') >= 0 ? oppK.split('/')[0] : oppK;
      // Skip ghost entries where oppKey equals accountKey (sanitizer artifact)
      if (baseOppKey === baseAcctKey) { mergeCount++; continue; }
      if (!clean[baseAcctKey].opportunities[baseOppKey]) {
        clean[baseAcctKey].opportunities[baseOppKey] = opps[oppK];
      }
      if (baseAcctKey !== acctKey || baseOppKey !== oppK) mergeCount++;
    }
  }
  if (mergeCount > 0) console.log('[Sanitize] Merged ' + mergeCount + ' corrupt nested key(s) back into base accounts');
  return clean;
}

<script>
/* Google Drive Integration Layer */
(function() {
  'use strict';
  const CLIENT_ID = '11285731141-i4rcs5pdj4u59c08ert8o21e8fgv02fg.apps.googleusercontent.com';
  const SCOPES = 'https://www.googleapis.com/auth/drive.readonly';
  const SUPPORTED_MIME = {
    'application/pdf': 'pdf',
    'text/plain': 'text',
    'text/csv': 'text',
    'application/vnd.google-apps.document': 'gdoc',
    'application/vnd.openxmlformats-officedocument.wordprocessingml.document': 'text',
    'text/html': 'text',
    'text/markdown': 'text',
    'application/json': 'text',
    'application/rtf': 'text'
  };
  const MAX_FILE_SIZE = 10 * 1024 * 1024;

  let accessToken = null;
  let tokenExpiry = 0;

  function extractFolderId(url) {
    if (!url) return null;
    const patterns = [
      /\/folders\/([a-zA-Z0-9_-]+)/,
      /id=([a-zA-Z0-9_-]+)/,
      /^([a-zA-Z0-9_-]{20,})$/
    ];
    for (const p of patterns) {
      const m = url.match(p);
      if (m) return m[1];
    }
    return null;
  }

  function isTokenValid() {
    return accessToken && Date.now() < tokenExpiry;
  }

  let authInProgress = false;

  function authenticate() {
    return new Promise(function(resolve, reject) {
      if (isTokenValid()) { resolve(accessToken); return; }
      if (!window.google || !window.google.accounts) {
        reject(new Error('Google Identity Services not loaded. Please refresh and try again.'));
        return;
      }
      if (authInProgress) {
        console.log('[DriveAuth] Auth already in progress, waiting...');
        var waitInterval = setInterval(function() {
          if (!authInProgress) {
            clearInterval(waitInterval);
            if (isTokenValid()) resolve(accessToken);
            else reject(new Error('Concurrent auth completed but no token'));
          }
        }, 500);
        return;
      }
      authInProgress = true;
      var settled = false;
      var authTimeout = setTimeout(function() {
        if (!settled) {
          settled = true;
          authInProgress = false;
          console.error('[DriveAuth] Auth timed out after 60s');
          reject(new Error('Google auth timed out. Please try again — if a popup appeared, make sure to complete the sign-in.'));
        }
      }, 60000);
      console.log('[DriveAuth] Starting OAuth flow...');
      var client = window.google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPES,
        callback: function(response) {
          if (settled) return;
          settled = true;
          clearTimeout(authTimeout);
          authInProgress = false;
          if (response.error) {
            console.error('[DriveAuth] Auth failed:', response.error, response.error_description);
            reject(new Error('Google auth failed: ' + (response.error_description || response.error)));
            return;
          }
          accessToken = response.access_token;
          tokenExpiry = Date.now() + (response.expires_in * 1000) - 60000;
          console.log('[DriveAuth] Auth succeeded, token valid for ~' + Math.round(response.expires_in / 60) + ' min');
          resolve(accessToken);
        },
        error_callback: function(err) {
          if (settled) return;
          settled = true;
          clearTimeout(authTimeout);
          authInProgress = false;
          console.error('[DriveAuth] Auth error:', err);
          reject(new Error('Google auth error: ' + (err.message || 'popup blocked or closed') + '. Please allow the popup and try again.'));
        }
      });
      client.requestAccessToken({ prompt: '' });
    });
  }

  async function driveApiFetch(endpoint, token) {
    const resp = await fetch('https://www.googleapis.com/drive/v3/' + endpoint, {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if (!resp.ok) {
      const errText = await resp.text().catch(function() { return resp.statusText; });
      throw new Error('Drive API error (' + resp.status + '): ' + errText);
    }
    return resp;
  }

  async function listFilesInFolder(folderId, token) {
    const q = encodeURIComponent("'" + folderId + "' in parents and trashed = false");
    const fields = encodeURIComponent('files(id,name,mimeType,size)');
    const resp = await driveApiFetch('files?q=' + q + '&fields=' + fields + '&pageSize=50', token);
    const data = await resp.json();
    return data.files || [];
  }

  async function downloadFile(fileId, mimeType, fileName, token) {
    if (mimeType === 'application/vnd.google-apps.document') {
      const resp = await driveApiFetch('files/' + fileId + '/export?mimeType=text/plain', token);
      const text = await resp.text();
      return { name: fileName + '.txt', type: 'text/plain', text: text };
    }
    if (mimeType === 'application/vnd.google-apps.spreadsheet') {
      const resp = await driveApiFetch('files/' + fileId + '/export?mimeType=text/csv', token);
      const text = await resp.text();
      return { name: fileName + '.csv', type: 'text/plain', text: text };
    }
    if (mimeType === 'application/vnd.google-apps.presentation') {
      const resp = await driveApiFetch('files/' + fileId + '/export?mimeType=text/plain', token);
      const text = await resp.text();
      return { name: fileName + '.txt', type: 'text/plain', text: text };
    }
    if (mimeType === 'application/pdf') {
      const resp = await fetch('https://www.googleapis.com/drive/v3/files/' + fileId + '?alt=media', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      if (!resp.ok) throw new Error('Failed to download ' + fileName);
      const blob = await resp.blob();
      return new Promise(function(resolve, reject) {
        const reader = new FileReader();
        reader.onload = function(ev) {
          try {
            const base64 = ev.target.result.split(',')[1];
            resolve({ name: fileName, type: 'application/pdf', base64: base64 });
          } catch(e) { reject(e); }
        };
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      });
    }
    const resp = await fetch('https://www.googleapis.com/drive/v3/files/' + fileId + '?alt=media', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if (!resp.ok) throw new Error('Failed to download ' + fileName);
    const text = await resp.text();
    return { name: fileName, type: 'text/plain', text: text };
  }

  async function fetchDriveFiles(driveUrl, onStatus) {
    const folderId = extractFolderId(driveUrl);
    if (!folderId) throw new Error('Could not extract folder ID from Drive URL');
    onStatus = onStatus || function() {};
    onStatus('Authenticating with Google Drive...');
    const token = await authenticate();
    onStatus('Listing files in Drive folder...');
    const allFiles = await listFilesInFolder(folderId, token);
    const supportedFiles = allFiles.filter(function(f) {
      const isGoogleNative = f.mimeType.startsWith('application/vnd.google-apps.');
      if (isGoogleNative) {
        return ['application/vnd.google-apps.document',
                'application/vnd.google-apps.spreadsheet',
                'application/vnd.google-apps.presentation'].includes(f.mimeType);
      }
      return SUPPORTED_MIME.hasOwnProperty(f.mimeType);
    }).filter(function(f) {
      if (!f.mimeType.startsWith('application/vnd.google-apps.') && f.size && parseInt(f.size) > MAX_FILE_SIZE) {
        console.warn('[Drive] Skipping large file:', f.name, f.size);
        return false;
      }
      return true;
    });
    if (supportedFiles.length === 0) {
      onStatus('No supported files found in Drive folder');
      return [];
    }
    onStatus('Downloading ' + supportedFiles.length + ' file(s) from Drive...');
    const results = [];
    for (let i = 0; i < supportedFiles.length; i++) {
      const f = supportedFiles[i];
      onStatus('Downloading (' + (i + 1) + '/' + supportedFiles.length + '): ' + f.name);
      try {
        const content = await downloadFile(f.id, f.mimeType, f.name, token);
        if (content) results.push(content);
      } catch (err) {
        console.error('[Drive] Failed to download', f.name, err);
      }
    }
    onStatus('Downloaded ' + results.length + ' file(s) from Google Drive');
    return results;
  }

  window.DriveIntegration = {
    fetchDriveFiles: fetchDriveFiles,
    authenticate: authenticate,
    extractFolderId: extractFolderId,
    isTokenValid: isTokenValid
  };

  console.log('[DriveIntegration] Google Drive integration layer loaded');
})();

  /**
   * Load and initialize Supabase client from CDN
   */
  async function initSupabase() {
    return new Promise((resolve, reject) => {
      if (window.supabase) {
        supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        console.log(`${LOG_PREFIX} Supabase client initialized`);
        isInitialized = true;
        resolve();
        return;
      }

      // Load from CDN if not already loaded
      const script = document.createElement('script');
      script.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.38.0/dist/umd/supabase.js';
      script.onload = () => {
        supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        console.log(`${LOG_PREFIX} Supabase client initialized`);
        isInitialized = true;
        resolve();

        console.error(`${LOG_PREFIX} Failed to load Supabase library`);
        reject(new Error('Failed to load Supabase library'));
      };
      document.head.appendChild(script);
    });
  }

  /**
   * Restore deal mapping from localStorage
   */
  function restoreDealMapping() {
    try {
      const stored = localStorage.getItem(DEAL_MAPPING_KEY);
      if (stored) {
        dealKeyToIdMap = JSON.parse(stored);
        console.log(`${LOG_PREFIX} Restored deal mapping:`, dealKeyToIdMap);
      }
    } catch (err) {
      console.warn(`${LOG_PREFIX} Failed to restore deal mapping:`, err);
      dealKeyToIdMap = {};
    }
  }

  /**
   * Save deal mapping to localStorage
   */
  function saveDealMapping() {
    try {
      localStorage.setItem(DEAL_MAPPING_KEY, JSON.stringify(dealKeyToIdMap));
    } catch (err) {
      console.warn(`${LOG_PREFIX} Failed to save deal mapping:`, err);
    }
  }

  /**
   * Retry logic wrapper
   */
  async function withRetry(fn, description) {
    let lastError;
    for (let attempt = 1; attempt <= RETRY_ATTEMPTS; attempt++) {
      try {
        return await fn();
      } catch (err) {
        lastError = err;
        if (attempt < RETRY_ATTEMPTS) {
          const delay = RETRY_DELAY * attempt;
          console.warn(`${LOG_PREFIX} ${description} failed (attempt ${attempt}/${RETRY_ATTEMPTS}), retrying in ${delay}ms:`, err.message);
          await new Promise(resolve => setTimeout(resolve, delay));
        }
      }
    }
    throw lastError;
  }

  /**
   * Convert app flat format to Supabase format

  function dealToSupabaseFormat(dealKey, dealData, accountKey, oppKey) {
    const now = new Date().toISOString();

    const supabaseDeal = {

      virtualAgents: dealData.virtualAgents || '',

      deploymentModel: dealData.deploymentModel || '',
      region: dealData.region || '',

      professionalServices: dealData.professionalServices || '',
      expansionPotential: dealData.expansionPotential || '',
      generated: dealData.generated || {}

      notes: appData.notes || '',

    };

    for (const [rawAcctKey, account] of Object.entries(allDeals)) {
      if (!account.opportunities) continue;
      // Skip corrupt nested keys — they'll be merged into the base key by sanitizeDeals
      if (rawAcctKey.indexOf('/') >= 0) {
        console.log(`${LOG_PREFIX} Skipping corrupt account key: ${rawAcctKey}`);
        continue;
      }
      const accountKey = rawAcctKey;
      for (const [rawOppKey, dealData] of Object.entries(account.opportunities)) {
        if (rawOppKey.indexOf('/') >= 0) {
          console.log(`${LOG_PREFIX} Skipping corrupt opp key: ${rawOppKey}`);
          continue;
        }
        const oppKey = rawOppKey;
        const dealKey = accountKey + '/' + oppKey;
        try {
          const supabaseDeal = dealToSupabaseFormat(dealKey, dealData, accountKey, oppKey);
          const existingId = dealKeyToIdMap[dealKey];

          if (existingId) {
            // Update existing deal
            await withRetry(async () => {
              const { error } = await supabaseClient
                .from('deals')
                .update(supabaseDeal)
                .eq('id', existingId);

              if (error) throw error;
            }, `Updating deal "${dealKey}"`);

            results.updated++;
            console.log(`${LOG_PREFIX} Updated deal "${dealKey}" (${existingId})`);
          } else {
            // Create new deal
            const { data, error } = await withRetry(async () => {
              return supabaseClient
                .from('deals')
                .insert([supabaseDeal])
                .select('id');
            }, `Creating deal "${dealKey}"`);

            if (error) throw error;

            if (data && data[0]) {
              const newId = data[0].id;
              dealKeyToIdMap[dealKey] = newId;
              results.created++;
              console.log(`${LOG_PREFIX} Created deal "${dealKey}" (${newId})`);
            }
          }
        } catch (err) {
          results.failed++;
          results.errors.push({ dealKey, error: err.message });
          console.error(`${LOG_PREFIX} Failed to sync deal "${dealKey}":`, err);
        }
      }
    }

    saveDealMapping();
    saveToLocalStorage(allDeals);

    console.log(`${LOG_PREFIX} Sync complete:`, {
      created: results.created,
      updated: results.updated,
      failed: results.failed
    });

    return results;
  }

  /**
   * Upload a file to the deal-documents bucket
   * @param {string} dealKey - Composite key in format "accountKey/oppKey"
   */
  async function uploadFile(dealKey, file) {
    if (!isInitialized) {
      throw new Error('Supabase not initialized');
    }

    restoreDealMapping();
    const dealId = dealKeyToIdMap[dealKey];

    if (!dealId) {
      throw new Error(`Deal "${dealKey}" not found. Sync to Supabase first.`);
    }

    console.log(`${LOG_PREFIX} Uploading file "${file.name}" for deal "${dealKey}"...`);

    try {
      // Generate storage path
      const timestamp = Date.now();
      const fileName = `${dealId}/${timestamp}-${file.name}`;

      // Upload to storage
      const { error: uploadError } = await withRetry(async () => {
        return supabaseClient.storage
          .from(STORAGE_BUCKET_DOCS)
          .upload(fileName, file);
      }, `Uploading file "${file.name}"`);

      if (uploadError) throw uploadError;

      // Create document record
      const { error: dbError } = await withRetry(async () => {
        return supabaseClient
          .from('deal_documents')
          .insert([{
            deal_id: dealId,
            filename: file.name,
            file_type: file.type,
            file_size: file.size,
            storage_path: fileName
          }]);
      }, `Creating document record for "${file.name}"`);

      if (dbError) throw dbError;

      console.log(`${LOG_PREFIX} Successfully uploaded "${file.name}" for deal "${dealKey}"`);
      return { filename: file.name, storagePath: fileName };
    } catch (err) {
      console.error(`${LOG_PREFIX} Failed to upload file:`, err);
      throw err;
    }
  }

  /**
   * Save a generated document (MAP, Business Case, etc.)
   * @param {string} dealKey - Composite key in format "accountKey/oppKey"
   */
  async function saveGeneratedDoc(dealKey, docType, title, content) {
    if (!isInitialized) {
      throw new Error('Supabase not initialized');
    }

    restoreDealMapping();
    const dealId = dealKeyToIdMap[dealKey];

    if (!dealId) {
      throw new Error(`Deal "${dealKey}" not found. Sync to Supabase first.`);
    }

    console.log(`${LOG_PREFIX} Saving generated doc "${docType}" for deal "${dealKey}"...`);

    try {
      const { data, error } = await withRetry(async () => {
        return supabaseClient
          .from('generated_docs')
          .insert([{
            deal_id: dealId,
            doc_type: docType,
            title: title,
            content: typeof content === 'string' ? { text: content } : content
          }])
          .select('id');
      }, `Saving generated doc "${docType}"`);

      if (error) throw error;

      const docId = data && data[0] ? data[0].id : null;
      console.log(`${LOG_PREFIX} Saved generated doc "${docType}" (${docId})`);
      return { docId, docType, title };
    } catch (err) {
      console.error(`${LOG_PREFIX} Failed to save generated doc:`, err);
      throw err;
    }
  }

  /**
   * Add or update a deal update/note
   */
  async function addDealUpdate(dealKey, updateText, timestamp) {
    if (!isInitialized) {
      throw new Error('Supabase not initialized');
    }

    restoreDealMapping();
    const dealId = dealKeyToIdMap[dealKey];

    if (!dealId) {
      throw new Error(`Deal "${dealKey}" not found. Sync to Supabase first.`);
    }

    console.log(`${LOG_PREFIX} Adding update for deal "${dealKey}"...`);

    try {
      const { data, error } = await withRetry(async () => {
        return supabaseClient
          .from('deal_updates')
          .insert([{
            deal_id: dealId,
            text: updateText,
            timestamp: timestamp || new Date().toISOString()
          }])
          .select('id');
      }, `Adding update for deal "${dealKey}"`);

      if (error) throw error;

      console.log(`${LOG_PREFIX} Added update for deal "${dealKey}"`);
      return { updateId: data && data[0] ? data[0].id : null };
    } catch (err) {
      console.error(`${LOG_PREFIX} Failed to add update:`, err);
      throw err;
    }
  }

  /**
   * Check if Supabase layer is ready
   */
  function isReady() {
    return isInitialized && supabaseClient !== null;
  }

  /**
   * Delete one or more deals from Supabase by dealKey (format: "accountKey/oppKey")
   * or by accountKey (deletes all opportunities under that account).
   */
  async function deleteFromSupabase(keyOrKeys) {
    if (!isInitialized) return { deleted: 0, error: 'Not initialized' };
    restoreDealMapping();
    var keys = Array.isArray(keyOrKeys) ? keyOrKeys : [keyOrKeys];
    var ids = [];
    // For each key, resolve to UUIDs. Keys may be "acct/opp" (exact) or "acct" (prefix — all opps).
    for (var k of keys) {
      if (dealKeyToIdMap[k]) {
        ids.push(dealKeyToIdMap[k]);
      } else {
        // Prefix match: delete all deals whose mapping key starts with "k/"
        Object.keys(dealKeyToIdMap).forEach(function(mapKey) {
          if (mapKey === k || mapKey.indexOf(k + '/') === 0) {
            ids.push(dealKeyToIdMap[mapKey]);
          }
        });
      }
    }
    if (ids.length === 0) {
      console.log(`${LOG_PREFIX} deleteFromSupabase: no matching IDs for`, keys);
      return { deleted: 0 };
    }
    try {
      var { error } = await supabaseClient.from('deals').delete().in('id', ids);
      if (error) throw error;
      // Clean up local mapping
      Object.keys(dealKeyToIdMap).forEach(function(mapKey) {
        if (ids.indexOf(dealKeyToIdMap[mapKey]) >= 0) delete dealKeyToIdMap[mapKey];
      });
      localStorage.setItem(DEAL_MAPPING_KEY, JSON.stringify(dealKeyToIdMap));
      console.log(`${LOG_PREFIX} Deleted ${ids.length} deal(s) from Supabase`);
      return { deleted: ids.length };
    } catch (err) {
      console.error(`${LOG_PREFIX} deleteFromSupabase failed:`, err);
      return { deleted: 0, error: err.message };
    }
  }

  /**
   * Public API
   */
  window.SupabaseLayer = {
    init: initSupabase,
    loadFromSupabase: loadFromSupabase,
    syncToSupabase: syncToSupabase,
    deleteFromSupabase: deleteFromSupabase,
    uploadFile: uploadFile,
    saveGeneratedDoc: saveGeneratedDoc,
    addDealUpdate: addDealUpdate,
    isReady: isReady,
    getLocalCache: getLocalStorageCache,
    getMapping: () => ({ ...dealKeyToIdMap })
  };

  console.log(`${LOG_PREFIX} Module loaded. Call SupabaseLayer.init() to initialize.`);
})();
</script>
<script>/* Supabase Boot - Cloud Sync */
/**
 * Supabase Boot Script ÃÂÃÂ¢ÃÂÃÂÃÂÃÂ Injected AFTER the app code to monkey-patch
 * localStorage functions with Supabase cloud persistence.
 *
 * This script:
 * 1. Initializes the Supabase layer
 * 2. On first load, fetches deals from Supabase and merges with localStorage
 * 3. Overrides saveAllDeals to also sync to Supabase
 * 4. Adds a sync indicator to the UI
 */
(function() {
  'use strict';

  const BOOT_LOG = '[SupabaseBoot]';

  // Wait for SupabaseLayer to be available
  if (!window.SupabaseLayer) {
    console.error(`${BOOT_LOG} SupabaseLayer not loaded! Cloud sync disabled.`);
    return;
  }

  // Store references to original functions
  const _originalLoadAllDeals = window.loadAllDeals;
  const _originalSaveAllDeals = window.saveAllDeals;

  // Track sync state
  let supabaseReady = false;
  let syncInProgress = false;
  let lastSyncTime = null;
  let syncDebounceTimer = null;
  const SYNC_DEBOUNCE_MS = 2000; // Debounce saves to avoid hammering the DB

  // Initialize Supabase and do first sync
  async function boot() {
    console.log(`${BOOT_LOG} Initializing Supabase cloud sync...`);

    try {
      await window.SupabaseLayer.init();
      supabaseReady = true;
      console.log(`${BOOT_LOG} Supabase initialized. Loading cloud data...`);

      // Load from Supabase
      const cloudDeals = await window.SupabaseLayer.loadFromSupabase();
      const localDeals = _originalLoadAllDeals();

      // Migrate both to account model if needed, then sanitize to strip nested keys
      const _sanitize = typeof sanitizeDeals === 'function' ? sanitizeDeals : function(d){return d;};
      const migratedCloud = _sanitize(typeof migrateToAccountModel === 'function' ? migrateToAccountModel(cloudDeals) : cloudDeals);
      const migratedLocal = _sanitize(typeof migrateToAccountModel === 'function' ? migrateToAccountModel(localDeals) : localDeals);

      // Merge: cloud wins for existing deals, local adds new ones
      const merged = { ...migratedLocal };
      let cloudCount = 0;
      for (const [key, deal] of Object.entries(migratedCloud)) {
        merged[key] = deal;
        cloudCount++;
      }

      // Also push any local-only deals to Supabase
      const localOnlyKeys = Object.keys(localDeals).filter(k => !cloudDeals[k]);
      if (localOnlyKeys.length > 0) {
        console.log(`${BOOT_LOG} Found ${localOnlyKeys.length} local-only deal(s), syncing to cloud...`);
      }

      // Save merged state back to localStorage
      _originalSaveAllDeals(merged);

      // Sync everything to Supabase (this handles local-only deals)
      if (Object.keys(merged).length > 0) {
        await window.SupabaseLayer.syncToSupabase(merged);
      }

      lastSyncTime = new Date();
      console.log(`${BOOT_LOG} Initial sync complete. ${cloudCount} cloud deals, ${localOnlyKeys.length} local-only deals synced.`);

      // If there's a React app already rendered, trigger a refresh
      // by re-saving to localStorage (the app watches this)
      if (cloudCount > 0) {
        _originalSaveAllDeals(merged);
        // Dispatch a storage event to trigger any listeners
        window.dispatchEvent(new StorageEvent('storage', {
          key: 'salesai_deals_v2',
          newValue: JSON.stringify(merged)
        }));
      }

      addSyncIndicator('synced');

    } catch (err) {
      console.error(`${BOOT_LOG} Boot failed:`, err);
      addSyncIndicator('offline');
    }
  }

  // Override saveAllDeals to also sync to Supabase
  window.saveAllDeals = function(allDeals) {
    // Always save to localStorage immediately (fast, reliable)
    _originalSaveAllDeals(allDeals);

    // Debounced sync to Supabase
    if (supabaseReady) {
      if (syncDebounceTimer) clearTimeout(syncDebounceTimer);
      syncDebounceTimer = setTimeout(async () => {
        if (syncInProgress) return;
        syncInProgress = true;
        addSyncIndicator('syncing');

        try {
          await window.SupabaseLayer.syncToSupabase(allDeals);
          lastSyncTime = new Date();
          addSyncIndicator('synced');
        } catch (err) {
          console.error(`${BOOT_LOG} Background sync failed:`, err);
          addSyncIndicator('error');
        } finally {
          syncInProgress = false;
        }
      }, SYNC_DEBOUNCE_MS);
    }
  };

  // Add visual sync indicator
  function addSyncIndicator(status) {
    let indicator = document.getElementById('supabase-sync-indicator');
    if (!indicator) {
      indicator = document.createElement('div');
      indicator.id = 'supabase-sync-indicator';
      indicator.style.cssText = `
        position: fixed;
        bottom: 12px;
        right: 12px;
        padding: 6px 12px;
        border-radius: 20px;
        font-size: 11px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-weight: 500;
        z-index: 99999;
        display: flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      `;
      indicator.title = 'Cloud Sync Status';
      indicator.onclick = () => {
        if (supabaseReady && !syncInProgress) {
          const deals = _originalLoadAllDeals();
          window.saveAllDeals(deals); // Trigger manual sync
        }
      };
      document.body.appendChild(indicator);
    }

    const states = {
      synced: {
        bg: '#dcfce7',
        color: '#166534',
        border: '1px solid #86efac',
        icon: '\u2601\uFE0F',
        text: 'Cloud Synced' + (lastSyncTime ? ' \u2022 ' + lastSyncTime.toLocaleTimeString() : '')
      },
      syncing: {
        bg: '#fef3c7',
        color: '#92400e',
        border: '1px solid #fcd34d',
        icon: '\u21BB',
        text: 'Syncing...'
      },
      offline: {
        bg: '#fee2e2',
        color: '#991b1b',
        border: '1px solid #fca5a5',
        icon: '\u26A0\uFE0F',
        text: 'Offline ÃÂÃÂ¢ÃÂÃÂÃÂÃÂ Local Only'
      },
      error: {
        bg: '#fee2e2',
        color: '#991b1b',
        border: '1px solid #fca5a5',
        icon: '\u26A0\uFE0F',
        text: 'Sync Error ÃÂÃÂ¢ÃÂÃÂÃÂÃÂ Click to retry'
      }
    };

    const s = states[status] || states.offline;
    indicator.style.background = s.bg;
    indicator.style.color = s.color;
    indicator.style.border = s.border;
    indicator.innerHTML = `<span>${s.icon}</span><span>${s.text}</span>`;
  }

  // Start the boot process
  boot();
})();
</script>
